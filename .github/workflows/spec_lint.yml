name: Ruby RSpec and Lint check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.10"
          bundle-cache: false
      - name: Install dependencies
        run: |
          gem install rspec
          gem install rubocop
          gem install faker
      
      - name: Run RuboCop (Lint)
        run: rubocop

      - name: Run RSpec
        run: rspec --pattern '**/spec/**/*_spec.rb'
